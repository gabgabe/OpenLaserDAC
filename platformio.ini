; PlatformIO Project Configuration
; OpenLaserDAC - ESP32-S3 Laser DAC Controller
;
; Build: pio run
; Upload: pio run --target upload
; Monitor: pio device monitor

[platformio]
default_envs = openlaserdac

[env:openlaserdac]
platform = espressif32@^6.5.0
board = esp32-s3-devkitc-1
framework = espidf

; CPU frequency
board_build.f_cpu = 240000000L

; Flash settings  
board_build.flash_mode = qio
board_build.flash_size = 4MB
board_upload.flash_size = 4MB

; Use custom partition table
board_build.partitions = partitions.csv

; Monitor
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, colorize

; Build flags
build_flags = 
    -DCORE_DEBUG_LEVEL=3
    -DLOG_DAC_STATS=1
    -DLOG_RX_METER=1
    -DLOG_RATE_CHANGE=1
    -DLOG_PERF=0

; Debug build flags (uncomment build_type=debug for JTAG debugging)
; WARNING: debug build uses -Og which prevents inlining of dac_output_point
; into the timer ISR, causing flash cache conflicts and DAC output failure.
; debug_build_flags = 
;     ${this.build_flags}
;     -Wno-error=maybe-uninitialized
;     -Og
;     -ggdb3
; build_type = debug

; Upload settings
upload_speed = 921600
upload_protocol = esptool

; OTA Upload via HTTP (after first flash):
; curl -X POST -F "file=@.pio/build/openlaserdac/firmware.bin" http://<DEVICE_IP>/api/ota
;     --auth=ildawavex16

; Debug (JTAG debugging via USB)
debug_tool = esp-builtin
debug_init_break = tbreak app_main
debug_speed = 5000